<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotion&Dopamine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}

.players{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;z-index:2;}

.player{
  background:rgba(0,0,0,0.85);
  border-radius:50%;
  width:170px;
  height:170px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  border:1px solid rgba(255,255,255,0.2);
}

.play-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:22px;
  cursor:pointer;
  color:#fff;
}

.hardcore{background:#ff00ff;}
.handsup{background:#00ffff;}
.handsup2{background:#00ff99;}
.trance{background:#aa00ff;}

</style>
</head>

<body>

<canvas id="visualizer"></canvas>

<div class="players">
  <div class="player"><h3>Hardcore</h3><button class="play-btn hardcore" data-index="0">▶</button></div>
  <div class="player"><h3>Hands Up</h3><button class="play-btn handsup" data-index="1">▶</button></div>
  <div class="player"><h3>Hands Up 2</h3><button class="play-btn handsup2" data-index="2">▶</button></div>
  <div class="player"><h3>Trance</h3><button class="play-btn trance" data-index="3">▶</button></div>
</div>

<script>
const streams = [
  "https://stream.zeno.fm/r8s232x3xg0uv",
  "https://rautemusik.stream25.radiohost.de/club",
  "https://listen.technobase.fm/tunein-mp3",
  "https://rautemusik.stream43.radiohost.de/trance"
];

let audio = new Audio();
let analyser, source;
let current = -1;

const canvas = document.getElementById("visualizer");
const c = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

class Particle{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*2+0.5;
    this.speedX=Math.random()*0.4-0.2;
    this.speedY=Math.random()*-0.4-0.2;
    this.hue=Math.random()*360;
    this.opacity=Math.random()*0.5+0.3;
  }
  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
    if(this.y<0)this.reset();
  }
  draw(){
    c.globalAlpha=this.opacity;
    c.fillStyle=`hsl(${this.hue},100%,70%)`;
    c.beginPath();
    c.arc(this.x,this.y,this.size,0,Math.PI*2);
    c.fill();
  }
}

let particles=[];
for(let i=0;i<40;i++)particles.push(new Particle());

document.querySelectorAll(".play-btn").forEach(btn=>{
  btn.onclick=()=>{
    const i=btn.dataset.index;
    audio.src=streams[i];
    audio.play();
    current=i;

    if(!analyser){
      const ctx=new AudioContext();
      analyser=ctx.createAnalyser();
      source=ctx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(ctx.destination);
      analyser.fftSize=256;
      animate();
    }
  }
});

function animate(){
  requestAnimationFrame(animate);

  c.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.update();
    p.draw();
  });

  if(!analyser)return;

  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  const cx=canvas.width/2;
  const cy=canvas.height/2;

  const baseRadius=90;
  const bars=120;

  for(let i=0;i<bars;i++){
    const v=data[i];
    const angle=(i/bars)*Math.PI*2;

    const len=v*0.6;

    const x1=cx+Math.cos(angle)*baseRadius;
    const y1=cy+Math.sin(angle)*baseRadius;

    const x2=cx+Math.cos(angle)*(baseRadius+len);
    const y2=cy+Math.sin(angle)*(baseRadius+len);

    c.strokeStyle=`hsl(${i*3},100%,60%)`;
    c.lineWidth=3;
    c.beginPath();
    c.moveTo(x1,y1);
    c.lineTo(x2,y2);
    c.stroke();
  }
}
</script>

</body>
</html>
