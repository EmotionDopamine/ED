<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* O PLAYER - Garantido Redondo */
        .player-disk {
            width: 160px;
            height: 160px; /* Altura igual à largura */
            background: #111;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%; /* Círculo Perfeito */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* Canvas das Barras (Ajustado para ser pequeno) */
        #visualizer {
            position: absolute;
            width: 240px; 
            height: 240px;
            z-index: -1; /* Fica atrás do disco */
        }

        .info {
            color: #aaa;
            text-align: center;
            pointer-events: none;
        }

        .genres {
            margin-top: 10px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            gap: 15px;
            color: #666;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="ui-container">
        <canvas id="visualizer"></canvas>
        
        <div class="player-disk">
            <span style="font-size: 10px; opacity: 0.5;">NOW PLAYING</span>
            <div style="font-weight: bold; margin: 5px 0;">Lo-Fi Beat</div>
            <div style="width: 30px; height: 2px; background: #ff4d4d;"></div>
        </div>

        <div class="genres">
            <span>Pop</span>
            <span>Jazz</span>
            <span>Electronic</span>
            <span>Lo-Fi</span>
        </div>
    </div>

    <script>
        // 1. CONFIGURAÇÃO DAS PARTÍCULAS (Lentas, Coloridas e Pequenas)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5; // Bem pequenas
                this.speedX = (Math.random() - 0.5) * 0.3; // Bem lentas
                this.speedY = (Math.random() - 0.5) * 0.3; // Bem lentas
                this.color = `hsl(${Math.random() * 360}, 60%, 70%)`; // Coloridas
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.init();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<100; i++) particles.push(new Particle());

        // 2. VISUALIZADOR DE BARRAS (Círculo Pequeno)
        const vCanvas = document.getElementById('visualizer');
        const vCtx = vCanvas.getContext('2d');
        vCanvas.width = 300;
        vCanvas.height = 300;

        function drawVisualizer() {
            vCtx.clearRect(0, 0, vCanvas.width, vCanvas.height);
            const centerX = vCanvas.width / 2;
            const centerY = vCanvas.height / 2;
            const radius = 95; // Raio pequeno rente ao player
            const bars = 50;

            for (let i = 0; i < bars; i++) {
                const angle = (i * Math.PI * 2) / bars;
                // Simulação de movimento suave das barras
                const bHeight = 10 + Math.sin(Date.now() * 0.002 + i) * 15; 
                
                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + bHeight);
                const y2 = centerY + Math.sin(angle) * (radius + bHeight);

                vCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                vCtx.lineWidth = 2;
                vCtx.lineCap = 'round';
                vCtx.beginPath();
                vCtx.moveTo(x1, y1);
                vCtx.lineTo(x2, y2);
                vCtx.stroke();
            }
        }

        // Loop de Animação
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            drawVisualizer();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
