<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotion&Dopamine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
  background:#000;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* GRID BACKGROUND */
.grid-container{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#120020,#000);
}
.grid{
  position:absolute;
  width:200%;
  height:100%;
  background-image:linear-gradient(rgba(255,0,255,.15)1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,0,255,.15)1px,transparent 1px);
  background-size:50px 50px;
  transform:rotateX(60deg);
  animation:gridMove 8s linear infinite;
}
@keyframes gridMove{
  from{transform:rotateX(60deg) translateY(0)}
  to{transform:rotateX(60deg) translateY(50px)}
}

canvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:1;
}

/* LOGO */
h1{
  font-family:'Orbitron';
  font-size:4rem;
  margin-bottom:10px;
  text-align:center;
  background:linear-gradient(90deg,#ff00ff,#00ffff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  opacity:.7;
  margin-bottom:30px;
}

/* PLAYERS */
.players{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
  justify-content:center;
  z-index:3;
}

.player{
  width:170px;
  height:170px;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  transition:.4s;
  border:1px solid rgba(255,255,255,0.15);
}

.player:hover{
  transform:scale(1.08);
}

.play-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:22px;
  color:#fff;
  cursor:pointer;
  transition:.3s;
}

.play-btn:hover{
  transform:scale(1.1);
}

/* cores */
.hardcore{background:linear-gradient(135deg,#ff00ff,#8a00ff);}
.handsup{background:linear-gradient(135deg,#00ffff,#0088aa);}
.handsup2{background:linear-gradient(135deg,#00ff99,#00aa66);}
.trance{background:linear-gradient(135deg,#aa00ff,#00ccff);}

</style>
</head>

<body>

<div class="grid-container"><div class="grid"></div></div>
<canvas id="visualizer"></canvas>

<h1>Emotion & Dopamine</h1>
<div class="subtitle">Feel the vibe</div>

<div class="players">
  <div class="player"><h3>Hardcore</h3><button class="play-btn hardcore" data-index="0">▶</button></div>
  <div class="player"><h3>Hands Up</h3><button class="play-btn handsup" data-index="1">▶</button></div>
  <div class="player"><h3>Hands Up 2</h3><button class="play-btn handsup2" data-index="2">▶</button></div>
  <div class="player"><h3>Trance</h3><button class="play-btn trance" data-index="3">▶</button></div>
</div>

<script>
const streams = [
  "https://stream.zeno.fm/r8s232x3xg0uv",
  "https://rautemusik.stream25.radiohost.de/club",
  "https://listen.technobase.fm/tunein-mp3",
  "https://rautemusik.stream43.radiohost.de/trance"
];

let audio = new Audio();
let analyser, source;

const canvas = document.getElementById("visualizer");
const c = canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

/* PARTICULAS SUAVES */
class Particle{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*2;
    this.speedX=Math.random()*0.3-0.15;
    this.speedY=Math.random()*-0.3-0.1;
    this.hue=Math.random()*360;
  }
  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
    if(this.y<0)this.reset();
  }
  draw(){
    c.fillStyle=`hsl(${this.hue},100%,70%)`;
    c.beginPath();
    c.arc(this.x,this.y,this.size,0,Math.PI*2);
    c.fill();
  }
}

let particles=[];
for(let i=0;i<35;i++)particles.push(new Particle());

/* PLAY */
document.querySelectorAll(".play-btn").forEach(btn=>{
  btn.onclick=()=>{
    const i=btn.dataset.index;
    audio.src=streams[i];
    audio.play();

    if(!analyser){
      const ctx=new AudioContext();
      analyser=ctx.createAnalyser();
      source=ctx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(ctx.destination);
      analyser.fftSize=256;
      animate();
    }
  }
});

/* VISUALIZER */
function animate(){
  requestAnimationFrame(animate);

  c.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.update();
    p.draw();
  });

  if(!analyser)return;

  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  const cx=canvas.width/2;
  const cy=canvas.height/2;

  const radius=90;
  const bars=120;

  for(let i=0;i<bars;i++){
    const v=data[i];
    const angle=(i/bars)*Math.PI*2;

    const len=v*0.6;

    const x1=cx+Math.cos(angle)*radius;
    const y1=cy+Math.sin(angle)*radius;

    const x2=cx+Math.cos(angle)*(radius+len);
    const y2=cy+Math.sin(angle)*(radius+len);

    c.strokeStyle=`hsl(${i*3},100%,60%)`;
    c.lineWidth=3;
    c.beginPath();
    c.moveTo(x1,y1);
    c.lineTo(x2,y2);
    c.stroke();
  }
}
</script>

</body>
</html>
