<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Music Player Minimalista</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas-particles {
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        /* Ajuste do Visualizador Circular */
        #visualizer {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Player Redondinho */
        .player-disk {
            width: 150px; /* Tamanho fixo igual para ser circular */
            height: 150px;
            background: #222;
            border-radius: 50%; /* Círculo perfeito */
            border: 4px solid #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }

        .genre-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .genre-list li {
            padding: 5px;
            font-size: 0.9em;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <canvas id="canvas-particles"></canvas>

    <div class="container">
        <canvas id="visualizer-bars"></canvas>
        <div class="player-disk">
            <strong>PLAYING</strong>
            <small>Lo-Fi / Jazz</small>
        </div>
        
        <ul class="genre-list">
            <li>Pop</li>
            <li>Jazz</li>
            <li>Lo-Fi</li>
        </ul>
    </div>

    <script>
        const canvas = document.getElementById('canvas-particles');
        const ctx = canvas.getContext('2d');
        const barCanvas = document.getElementById('visualizer-bars');
        const barCtx = barCanvas.getContext('2d');

        let particles = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configuração do Círculo de Barras (Menor)
        barCanvas.width = 400;
        barCanvas.height = 400;
        const centerX = barCanvas.width / 2;
        const centerY = barCanvas.height / 2;
        const radius = 90; // Raio reduzido

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1; // Menores
                this.speedX = (Math.random() - 0.5) * 0.5; // Mais lentas
                this.speedY = (Math.random() - 0.5) * 0.5; // Mais lentas
                this.color = `hsl(${Math.random() * 360}, 70%, 70%)`; // Coloridas
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function drawBars() {
            barCtx.clearRect(0, 0, barCanvas.width, barCanvas.height);
            const bars = 60;
            const barWidth = 3;
            
            for (let i = 0; i < bars; i++) {
                const angle = (i * Math.PI * 2) / bars;
                // Altura da barra simulada (pequena)
                const barHeight = 15 + Math.random() * 10; 
                
                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                const y2 = centerY + Math.sin(angle) * (radius + barHeight);

                barCtx.strokeStyle = 'white';
                barCtx.lineWidth = barWidth;
                barCtx.beginPath();
                barCtx.moveTo(x1, y1);
                barCtx.lineTo(x2, y2);
                barCtx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            drawBars();
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
